<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sun Icon Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      gap: 24px;
      font-family: system-ui, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
    }
    .panel {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    .sizes {
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 32px;
      margin-top: 24px;
    }
    .size-item img {
      display: block;
      margin: 0 auto 8px;
      image-rendering: auto;
    }
    .label {
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Sun Icon Preview</h1>
    <p>Proposed design: 8 pointed rays on light blue background</p>
    <div class="sizes">
      <div class="size-item">
        <img src="./sun-icon-preview.svg" width="512" height="512" alt="512px preview">
        <div class="label">512px</div>
      </div>
      <div class="size-item">
        <img src="./sun-icon-preview.svg" width="192" height="192" alt="192px preview">
        <div class="label">192px</div>
      </div>
      <div class="size-item">
        <img src="./sun-icon-preview.svg" width="32" height="32" alt="32px favicon size">
        <div class="label">32px (tab size)</div>
      </div>
    </div>
  </div>
</body>
</html>
