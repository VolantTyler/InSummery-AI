# InSummery agent evaluation configuration.
# Run with: insummery-eval run   (see tests/eval/README.md)

profile: tests/test_cases/profile_10_kids.json

datasets:
  triager: tests/eval/datasets/triager_cases.json
  interpreter_registration:
    manifest: tests/test_cases/test_cases_manifest.json
    cases_dir: tests/test_cases
  interpreter_disruption: tests/eval/datasets/interpreter_disruption_cases.json
  # End-to-end suite: the same curated registration emails, but run through
  # the full production ADK workflow (mask -> triager -> interpreter -> gate)
  # instead of the interpreter agent in isolation.
  workflow_registration:
    manifest: tests/test_cases/test_cases_manifest.json
    cases_dir: tests/test_cases

# Absolute quality gates. `insummery-eval run` fails if any metric drops
# below its threshold, regardless of the baseline.
thresholds:
  triager_accuracy: 0.90
  registration_field_score: 0.85
  disruption_field_score: 0.85
  # Registration extractions on these unambiguous cases should clear the
  # production HITL confidence gate (>= 80).
  registration_confidence_gate_rate: 0.90
  # End-to-end: share of registration emails that make it through the whole
  # workflow with correct routing, confident extraction, and exact critical
  # fields. Matches the 80% bar of the former standalone smoke test.
  workflow_pass_rate: 0.80
  workflow_field_score: 0.85

# Regression gate relative to the committed baseline for the active model.
# A metric may drop at most this much below the baseline before the run fails.
regression_tolerance: 0.05

baselines:
  # Committed baselines (one file per model) live here. Per the project
  # decision, only Gemini baselines are committed - they are the reference
  # for the capstone submission. Baselines produced against local Ollama
  # models are written to the local/ subdirectory, which is gitignored.
  dir: tests/eval/baselines
  local_dir: tests/eval/baselines/local
